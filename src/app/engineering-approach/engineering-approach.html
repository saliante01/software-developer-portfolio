<section id="engineering-approach" class="relative py-24 px-6 md:px-16 overflow-hidden"
         style="background: #1c1c1e;">

  <div #sectionRef class="relative z-10 max-w-7xl mx-auto">

    <div style="transition: opacity 800ms ease, transform 800ms ease;"
         [style.opacity]="headerVisible ? '1' : '0'"
         [style.transform]="headerVisible ? 'translateY(0)' : 'translateY(-24px)'">
      <p style="font-size: 13px; font-weight: 700; letter-spacing: 3px;
                text-transform: uppercase; color: #888;">
        Engineering Fundamentals
      </p>
      <h2 style="font-family: 'Barlow Condensed', 'Arial Black', Impact, sans-serif;
                 font-weight: 900; font-size: clamp(42px, 6vw, 72px);
                 color: #fff; margin-top: 6px; letter-spacing: -1px;">
        Enfoque de Ingeniería.
      </h2>
    </div>

    <div class="mt-16 grid grid-cols-1 md:grid-cols-2 gap-6">

      <div *ngFor="let card of approachCards; let i = index"
           [style.transition-duration]="'700ms'"
           [style.transition-property]="'opacity, transform'"
           [style.transition-timing-function]="'cubic-bezier(0.25, 0.46, 0.45, 0.94)'"
           [style.opacity]="cardsVisible ? '1' : '0'"
           [style.transform]="cardsVisible ? 'translateY(0)' : 'translateY(60px)'"
           [style.transition-delay]="(i * 150) + 'ms'">

        <div style="background: #2a2a2c; border-radius: 20px; padding: 36px;
                    border: 1px solid rgba(255,255,255,0.06);
                    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
                    display: flex; flex-direction: column; gap: 0;"
             class="transition-all duration-300 hover:-translate-y-1"
             onmouseover="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.boxShadow='0 24px 72px rgba(0,0,0,0.5)'"
             onmouseout="this.style.borderColor='rgba(255,255,255,0.06)'; this.style.boxShadow='0 20px 60px rgba(0,0,0,0.4)'">

          <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
            <div style="width: 48px; height: 48px; border-radius: 14px;
                        background: rgba(255,255,255,0.07);
                        border: 1px solid rgba(255,255,255,0.1);
                        display: flex; align-items: center; justify-content: center;
                        flex-shrink: 0; color: #bbb;"
                 [innerHTML]="card.iconSvg">
            </div>
            <div>
              <h3 style="color: #fff; font-size: 18px; font-weight: 800;
                         letter-spacing: 0.3px; line-height: 1.3;">
                {{ card.title }}
              </h3>
              <p style="font-size: 12px; font-weight: 600; color: #777;
                        letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;">
                {{ card.subtitle }}
              </p>
            </div>
          </div>

          <p style="font-size: 14.5px; color: #bbb; line-height: 1.75;"
             [innerHTML]="formatDescription(card.description)">
          </p>

        </div>
      </div>

    </div>

  </div>
</section>
