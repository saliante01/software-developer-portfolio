<section id="projects" class="py-24 px-6 md:px-16 overflow-hidden"
         style="background: #1c1c1e;">

  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <p style="font-size: 13px; font-weight: 700; letter-spacing: 3px;
              text-transform: uppercase; color: #888;">
      Case Studies
    </p>
    <h2 style="font-family: 'Barlow Condensed', 'Arial Black', Impact, sans-serif;
               font-weight: 900; font-size: clamp(42px, 6vw, 72px);
               color: #fff; margin-top: 6px; letter-spacing: -1px;">
      Projects.
    </h2>
    <p style="margin-top: 20px; font-size: 16px; line-height: 1.85;
              color: #888; max-width: 640px;">
      These projects demonstrate my expertise with practical examples of some of my work,
      including brief descriptions and links to code repositories and live demos.
    </p>

    <!-- Cards — ocupan todo el ancho disponible -->
    <div class="mt-16 flex items-stretch gap-3 w-full"
         style="height: 500px;">

      <div *ngFor="let project of projects; let i = index"
           (click)="selectProject(i)"
           class="relative cursor-pointer overflow-hidden transition-all duration-500 flex-shrink-0"
           [style.flex]="activeIndex === i ? '4 0 0%' : '1 0 0%'"
           style="border-radius: 20px;
                  border: 2px solid rgba(255,255,255,0.08);
                  box-shadow: 0 20px 60px rgba(0,0,0,0.6);">

        <!-- Imagen de fondo -->
        <img [src]="project.image" [alt]="project.name"
             class="absolute inset-0 w-full h-full object-cover transition-all duration-500"
             [style.filter]="activeIndex === i
               ? 'brightness(0.45) grayscale(0%)'
               : 'brightness(0.25) grayscale(100%)'" />

        <!-- Nombre vertical (inactivas) -->
        <div *ngIf="activeIndex !== i"
             class="absolute inset-0 flex items-end justify-center pb-8"
             style="z-index: 2;">
          <span style="color: #fff; font-weight: 900; font-size: 13px;
                       letter-spacing: 3px; text-transform: uppercase;
                       writing-mode: vertical-rl; text-orientation: mixed;
                       transform: rotate(180deg); white-space: nowrap;">
            {{ project.name }}
          </span>
        </div>

        <!-- Contenido activo -->
        <div *ngIf="activeIndex === i"
             class="absolute inset-0 flex flex-col justify-end p-7 transition-all duration-500"
             style="z-index: 2;
                    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 55%, transparent 100%);">

          <!-- Github -->
          <a [href]="project.sourceCodeLink" target="_blank"
             (click)="$event.stopPropagation()"
             class="absolute top-4 right-4 flex items-center justify-center transition-transform hover:scale-110"
             style="width: 42px; height: 42px; border-radius: 50%;
                    background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
                    border: 1px solid rgba(255,255,255,0.2); z-index: 3;
                    text-decoration: none;">
            <i class="fa-brands fa-github text-white" style="font-size: 18px;"></i>
          </a>

          <h3 style="font-family: 'Barlow Condensed', 'Arial Black', sans-serif;
                     font-weight: 900; font-size: 32px; color: #fff;
                     text-transform: uppercase; letter-spacing: 1px; line-height: 1;">
            {{ project.name }}
          </h3>
          <p style="font-size: 14px; color: #ccc; margin-top: 10px; line-height: 1.6; max-width: 320px;">
            {{ project.description }}
          </p>

          <a [href]="project.liveDemoLink" target="_blank"
             (click)="$event.stopPropagation()"
             class="mt-5 inline-flex items-center gap-2 transition-opacity hover:opacity-80"
             style="background: rgba(255,255,255,0.1); backdrop-filter: blur(4px);
                    border: 1.5px solid rgba(255,255,255,0.35); border-radius: 10px;
                    padding: 10px 22px; color: #fff; font-size: 12px; font-weight: 800;
                    letter-spacing: 2.5px; text-transform: uppercase;
                    text-decoration: none; width: fit-content;">
            Live Demo
          </a>

        </div>

      </div>

    </div>
  </div>
</section>
