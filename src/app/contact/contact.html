<section id="contact" class="relative py-24 px-6 md:px-16 overflow-hidden"
         style="background: #eeece9;">

  <div #sectionRef class="relative z-10 max-w-7xl mx-auto">

    <div style="transition: opacity 800ms ease, transform 800ms ease;"
         [style.opacity]="headerVisible ? '1' : '0'"
         [style.transform]="headerVisible ? 'translateY(0)' : 'translateY(-24px)'">
      <p style="font-size: 13px; font-weight: 700; letter-spacing: 3px;
                text-transform: uppercase; color: #999;">
        Get in touch
      </p>
      <h2 style="font-family: 'Barlow Condensed', 'Arial Black', Impact, sans-serif;
                 font-weight: 900; font-size: clamp(42px, 6vw, 72px);
                 color: #111; margin-top: 6px; letter-spacing: -1px;">
        Contact.
      </h2>
      <p style="margin-top: 16px; font-size: 16px; line-height: 1.8; color: #666; max-width: 520px;">
        Siempre abierto a nuevas oportunidades, proyectos y colaboraciones.
        No dudes en escribirme por cualquiera de estos medios.
      </p>
    </div>

    <div class="mt-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

      <a *ngFor="let social of socials; let i = index"
         [href]="social.url"
         target="_blank"
         style="text-decoration: none;
                transition: opacity 600ms ease, transform 600ms cubic-bezier(0.25, 0.46, 0.45, 0.94);"
         [style.opacity]="social.visible ? '1' : '0'"
         [style.transform]="social.visible ? 'translateY(0)' : 'translateY(40px)'"
         class="group">

        <div style="background: #e8e6e2; border-radius: 16px; padding: 28px 32px;
                    box-shadow: 4px 4px 20px rgba(0,0,0,0.08);
                    display: flex; align-items: center; gap: 20px;
                    transition: transform 300ms ease, box-shadow 300ms ease;"
             onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='4px 12px 32px rgba(0,0,0,0.15)'"
             onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='4px 4px 20px rgba(0,0,0,0.08)'">

          <div style="width: 52px; height: 52px; border-radius: 50%;
                      background: #2d2d2d; flex-shrink: 0;
                      display: flex; align-items: center; justify-content: center;
                      box-shadow: 0 4px 16px rgba(0,0,0,0.3);">
            <svg *ngIf="social.name === 'LinkedIn'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#fff" viewBox="0 0 24 24">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            <svg *ngIf="social.name === 'GitHub'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#fff" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <svg *ngIf="social.name === 'Email'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#fff" viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
          </div>

          <div>
            <p style="font-size: 11px; font-weight: 700; letter-spacing: 2px;
                      text-transform: uppercase; color: #999; margin-bottom: 4px;">
              {{ social.name }}
            </p>
            <p style="font-size: 14px; font-weight: 600; color: #111;
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                      max-width: 200px;">
              {{ social.username }}
            </p>
          </div>

          <div style="margin-left: auto; color: #aaa; font-size: 14px;
                      transition: transform 300ms ease;"
               class="group-hover:translate-x-1">
             <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#aaa" viewBox="0 0 24 24">
               <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
             </svg>
          </div>

        </div>
      </a>

    </div>

    <div style="margin-top: 48px; display: flex; align-items: center; gap: 10px;"
         [style.opacity]="headerVisible ? '1' : '0'"
         [style.transition]="'opacity 800ms ease 600ms'">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#999" viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
      <span style="font-size: 14px; color: #888; font-weight: 500; letter-spacing: 1px;">
        Temuco, Chile
      </span>
    </div>

  </div>
</section>
