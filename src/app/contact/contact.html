<section id="contact" class="relative py-24 px-6 md:px-16 overflow-hidden"
         style="background: #eeece9;">

  <div #sectionRef class="relative z-10 max-w-7xl mx-auto">

    <div style="transition: opacity 800ms ease, transform 800ms ease;"
         [style.opacity]="headerVisible ? '1' : '0'"
         [style.transform]="headerVisible ? 'translateY(0)' : 'translateY(-24px)'">
      <p style="font-size: 13px; font-weight: 700; letter-spacing: 3px;
                text-transform: uppercase; color: #999;">
        Get in touch
      </p>
      <h2 style="font-family: 'Barlow Condensed', 'Arial Black', Impact, sans-serif;
                 font-weight: 900; font-size: clamp(42px, 6vw, 72px);
                 color: #111; margin-top: 6px; letter-spacing: -1px;">
        Contact.
      </h2>
      <p style="margin-top: 16px; font-size: 16px; line-height: 1.8; color: #666; max-width: 520px;">
        Siempre abierto a nuevas oportunidades, proyectos y colaboraciones.
        No dudes en escribirme por cualquiera de estos medios.
      </p>
    </div>

    <div class="mt-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

      <a *ngFor="let social of socials; let i = index"
         [href]="social.url"
         target="_blank"
         style="text-decoration: none;
                transition: opacity 600ms ease, transform 600ms cubic-bezier(0.25, 0.46, 0.45, 0.94);"
         [style.opacity]="social.visible ? '1' : '0'"
         [style.transform]="social.visible ? 'translateY(0)' : 'translateY(40px)'"
         class="group">

        <div style="background: #e8e6e2; border-radius: 16px; padding: 28px 32px;
                    box-shadow: 4px 4px 20px rgba(0,0,0,0.08);
                    display: flex; align-items: center; gap: 20px;
                    transition: transform 300ms ease, box-shadow 300ms ease;"
             onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='4px 12px 32px rgba(0,0,0,0.15)'"
             onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='4px 4px 20px rgba(0,0,0,0.08)'">

          <div style="width: 52px; height: 52px; border-radius: 50%;
                      background: #2d2d2d; flex-shrink: 0;
                      display: flex; align-items: center; justify-content: center;
                      box-shadow: 0 4px 16px rgba(0,0,0,0.3);">
            <i [class]="social.icon" style="color: #fff; font-size: 20px;"></i>
          </div>

          <div>
            <p style="font-size: 11px; font-weight: 700; letter-spacing: 2px;
                      text-transform: uppercase; color: #999; margin-bottom: 4px;">
              {{ social.name }}
            </p>
            <p style="font-size: 14px; font-weight: 600; color: #111;
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                      max-width: 200px;">
              {{ social.username }}
            </p>
          </div>

          <div style="margin-left: auto; color: #aaa; font-size: 14px;
                      transition: transform 300ms ease;"
               class="group-hover:translate-x-1">
            <i class="fa-solid fa-arrow-right"></i>
          </div>

        </div>
      </a>

    </div>

    <div style="margin-top: 48px; display: flex; align-items: center; gap: 10px;"
         [style.opacity]="headerVisible ? '1' : '0'"
         [style.transition]="'opacity 800ms ease 600ms'">
      <i class="fa-solid fa-location-dot" style="color: #999; font-size: 16px;"></i>
      <span style="font-size: 14px; color: #888; font-weight: 500; letter-spacing: 1px;">
        Santiago, Chile
      </span>
    </div>

  </div>
</section>
