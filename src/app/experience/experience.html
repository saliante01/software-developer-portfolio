<section id="experience" class="relative py-24 px-6 md:px-16 overflow-hidden"
         style="background: #1a1a1a;">

  <!-- Fondo ciudad -->
  <div class="absolute inset-0 z-0"
       style="background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1600&auto=format&fit=crop&q=60');
              background-size: cover; background-position: center;
              filter: grayscale(100%) brightness(0.35);">
  </div>

  <div #sectionRef class="relative z-10 max-w-7xl mx-auto">

    <!-- Header con fade in -->
    <div style="transition: opacity 800ms ease, transform 800ms ease;"
         [style.opacity]="headerVisible ? '1' : '0'"
         [style.transform]="headerVisible ? 'translateY(0)' : 'translateY(-24px)'">
      <p style="font-size: 13px; font-weight: 700; letter-spacing: 3px;
                text-transform: uppercase; color: #aaa;">
        My Skills
      </p>
      <h2 style="font-family: 'Barlow Condensed', 'Arial Black', Impact, sans-serif;
                 font-weight: 900; font-size: clamp(42px, 6vw, 72px);
                 color: #fff; margin-top: 6px; letter-spacing: -1px;">
        Technologies.
      </h2>
    </div>

    <!-- Fila 1 -->
    <div class="mt-16 flex flex-wrap gap-6 justify-center"
         style="transition: opacity 600ms ease, transform 600ms ease;"
         [style.opacity]="row1Visible ? '1' : '0'"
         [style.transform]="row1Visible ? 'translateX(0)' : 'translateX(-120px)'">
      <div *ngFor="let tech of techRow1"
           class="relative transition-all duration-300 hover:-translate-y-2 cursor-pointer group">
        <div style="width: 80px; height: 80px; border-radius: 50%;
                    background: rgba(30,30,30,0.85);
                    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
                    display: flex; align-items: center; justify-content: center;
                    border: 1px solid rgba(255,255,255,0.08);">
          <img [src]="tech.icon" [alt]="tech.name"
               style="width: 44px; height: 44px; object-fit: contain;" />
        </div>
        <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-3 px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap
                    invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-all duration-200"
             style="background: rgba(20,20,20,0.95); color: #fff; border: 1px solid rgba(255,255,255,0.15);
                    box-shadow: 0 8px 24px rgba(0,0,0,0.6);">
          {{ tech.name }}
        </div>
      </div>
    </div>

    <!-- Fila 2 -->
    <div class="mt-6 flex flex-wrap gap-6 justify-center"
         style="transition: opacity 600ms ease, transform 600ms ease;"
         [style.opacity]="row2Visible ? '1' : '0'"
         [style.transform]="row2Visible ? 'translateX(0)' : 'translateX(120px)'">
      <div *ngFor="let tech of techRow2"
           class="relative transition-all duration-300 hover:-translate-y-2 cursor-pointer group">
        <div style="width: 80px; height: 80px; border-radius: 50%;
                    background: rgba(30,30,30,0.85);
                    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
                    display: flex; align-items: center; justify-content: center;
                    border: 1px solid rgba(255,255,255,0.08);">
          <img [src]="tech.icon" [alt]="tech.name"
               style="width: 44px; height: 44px; object-fit: contain;" />
        </div>
        <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-3 px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap
                    invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-all duration-200"
             style="background: rgba(20,20,20,0.95); color: #fff; border: 1px solid rgba(255,255,255,0.15);
                    box-shadow: 0 8px 24px rgba(0,0,0,0.6);">
          {{ tech.name }}
        </div>
      </div>
    </div>

  </div>
</section>
